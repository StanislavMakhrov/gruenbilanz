name: PR Validation

on:
  pull_request:
    branches: [main]
    types: [ready_for_review, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  packages: write

jobs:
  docker:
    name: Build & Push Docker Image for UAT
    runs-on: ubuntu-latest
    # Only run on ready (non-draft) PRs.
    # When a coding agent pushes commits to a draft PR a `synchronize` event fires, but
    # all jobs below are intentionally skipped — this is expected behaviour and the
    # resulting "skipped" run in the Actions history is not a failure.
    # The pipeline runs for real only when `scripts/pr-github.sh mark-ready` converts
    # the draft PR to ready-for-review, which fires the `ready_for_review` event.
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "Guardrail: internal/workflow PRs must not bump versions"
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          changed_files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)
          if [ -z "$changed_files" ]; then
            echo "No changed files detected; skipping internal commit guardrail."
            exit 0
          fi

          # If anything outside these paths changed, this is not an internal-only PR.
          non_internal=$(echo "$changed_files" | grep -Ev '^(\.github/|scripts/|docs/)' || true)
          if [ -n "$non_internal" ]; then
            echo "Non-internal files changed; internal commit guardrail not applicable."
            exit 0
          fi

          echo "Internal-only PR detected; enforcing non-version-bumping commit types."

          # Versionize bumps on conventional commits like feat/fix (and breaking changes).
          messages=$(git log --format=%B "$BASE_SHA".."$HEAD_SHA" || true)

          if echo "$messages" | grep -Eqi '^(feat|fix|perf)(\([^)]*\))?:|BREAKING CHANGE:'; then
            echo "❌ ERROR: This PR only changes internal/workflow/tooling files, but includes version-bumping commits (feat/fix/perf or BREAKING CHANGE)."
            echo "Please use non-bumping types like chore:, ci:, docs:, style:, refactor: for internal changes."
            exit 1
          fi

          echo "✓ Commit messages OK for internal-only PR."

      - name: Check for Dockerfile
        id: dockerfile_check
        run: |
          if [ -f "src/Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No Dockerfile found — skipping Docker build."
          fi

      - name: Set up Docker Buildx
        if: steps.dockerfile_check.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: steps.dockerfile_check.outputs.exists == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository name and short SHA
        id: repo
        run: |
          echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "sha=$(echo '${{ github.event.pull_request.head.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        if: steps.dockerfile_check.outputs.exists == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}:pr-${{ github.event.pull_request.number }}-${{ steps.repo.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: UAT instructions
        if: steps.dockerfile_check.outputs.exists == 'true'
        run: |
          IMAGE="ghcr.io/${{ steps.repo.outputs.name }}:pr-${{ github.event.pull_request.number }}-${{ steps.repo.outputs.sha }}"
          {
            echo "## 🐳 UAT — Docker image ready"
            echo ""
            echo "Pull and run the image to verify this PR locally:"
            echo ""
            echo '```bash'
            echo "docker run --rm -p 3000:3000 ${IMAGE}"
            echo '```'
            echo ""
            echo "Then open **http://localhost:3000** in your browser."
            echo ""
            echo "> The seed runs automatically on first start — demo data is pre-loaded."
            echo "> The tag includes the commit SHA to ensure Docker always pulls the latest image."
          } | tee -a "$GITHUB_STEP_SUMMARY"

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: docker
    # Skipped for draft PRs (same guard as the `docker` job).
    # Pushes to a draft PR trigger a `synchronize` event but all jobs are intentionally
    # skipped — the pipeline only runs after `scripts/pr-github.sh mark-ready` converts
    # the PR from draft to ready-for-review (the `ready_for_review` event).
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for Dockerfile
        id: dockerfile_check
        run: |
          if [ -f "src/Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No Dockerfile found — skipping e2e tests."
          fi

      - name: Set lowercase repository name and short SHA
        if: steps.dockerfile_check.outputs.exists == 'true'
        id: repo
        run: |
          echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "sha=$(echo '${{ github.event.pull_request.head.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        if: steps.dockerfile_check.outputs.exists == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        if: steps.dockerfile_check.outputs.exists == 'true'
        run: |
          IMAGE="ghcr.io/${{ steps.repo.outputs.name }}:pr-${{ github.event.pull_request.number }}-${{ steps.repo.outputs.sha }}"
          docker pull "$IMAGE"
          echo "APP_IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Start Docker container
        if: steps.dockerfile_check.outputs.exists == 'true'
        run: |
          docker run -d --name app-e2e -p 3000:3000 "$APP_IMAGE"

      - name: Wait for app to be ready
        if: steps.dockerfile_check.outputs.exists == 'true'
        run: |
          echo "Waiting for app to be ready at http://localhost:3000 ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "✅ App is ready (attempt $i)"
              exit 0
            fi
            echo "  attempt $i/30 — not ready yet, retrying in 3 s..."
            sleep 3
          done
          echo "❌ App failed to start within 90 s — container logs:"
          docker logs app-e2e
          exit 1

      - name: Set up Node.js
        if: steps.dockerfile_check.outputs.exists == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Playwright and dependencies
        if: steps.dockerfile_check.outputs.exists == 'true'
        working-directory: e2e-tests
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run e2e tests
        if: steps.dockerfile_check.outputs.exists == 'true'
        working-directory: e2e-tests
        env:
          BASE_URL: http://localhost:3000
          CI: "true"
        run: npm test

      - name: Stop Docker container
        if: always() && steps.dockerfile_check.outputs.exists == 'true'
        run: |
          docker stop app-e2e || true
          docker rm app-e2e || true

      - name: Skip e2e tests (no Dockerfile)
        if: steps.dockerfile_check.outputs.exists == 'false'
        run: echo "✅ E2E tests skipped (no Dockerfile)"