name: Copilot Setup Steps

# This workflow customizes the GitHub Copilot coding agent environment
# It runs before the agent starts working to set up tools
# Documentation: https://docs.github.com/en/copilot/how-tos/use-copilot-agents/coding-agent/customize-the-agent-environment

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

permissions:
  contents: write
  pull-requests: write

env:
  GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install app dependencies
        working-directory: src
        run: npm ci || echo "No package-lock.json yet; skipping npm ci"

      - name: Install Playwright and e2e test dependencies
        # Install Playwright so the agent can run e2e tests locally with --e2e flag
        working-directory: e2e-tests
        run: |
          if [ -f package.json ]; then
            npm ci
            npx playwright install --with-deps chromium
          fi

      - name: Set up Docker Buildx
        # Buildx is required to replicate the multi-platform build used in PR Validation.
        # The agent uses this to run `scripts/docker-build-test.sh` locally before pushing.
        uses: docker/setup-buildx-action@v4

      - name: Export COPILOT_TOKEN to agent session
        # $GITHUB_ENV propagates to subsequent Actions steps only.
        # To reach the agent's interactive bash sessions (which start fresh),
        # we also write to ~/.bashrc and ~/.profile so every new shell inherits GH_TOKEN.
        # chmod 600 restricts the files to owner-only access after writing.
        env:
          COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          if [ -n "$COPILOT_TOKEN" ]; then
            echo "::add-mask::$COPILOT_TOKEN"
            echo "GH_TOKEN=$COPILOT_TOKEN" >> "$GITHUB_ENV"
            printf 'export GH_TOKEN=%s\n' "$COPILOT_TOKEN" >> ~/.bashrc
            printf 'export GH_TOKEN=%s\n' "$COPILOT_TOKEN" >> ~/.profile
            chmod 600 ~/.bashrc ~/.profile
          fi

      - name: Setup complete
        run: |
          echo "✓ GitHub Copilot coding agent environment ready"
          echo "  - Node.js: $(node --version)"
          echo "  - npm: $(npm --version)"
          echo "  - Docker: $(docker --version)"
          echo "  - Docker Buildx: $(docker buildx version)"
